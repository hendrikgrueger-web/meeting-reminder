name: QuickJoin
projectPath: QuickJoin.xcodeproj

settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1

options:
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"

  knownRegions:
    - en
    - de

schemes:
  QuickJoin:
    build:
      targets:
        QuickJoin: all
    test:
      targets:
        - QuickJoinTests
      gatherCoverageData: true
    run:
      askForUserToEnableDebugger: true
      consoleLogsInDebugConsole: true

targets:
  QuickJoin:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    bundleId: de.hendrikgrueger.quickjoin

    sources:
      - path: Meeting Reminder
        includes:
          - "**/*.swift"

    resources:
      - path: Meeting Reminder
        includes:
          - "**/*.xcassets"
          - "**/*.xcstrings"

    entitlements:
      path: Meeting Reminder/Meeting_Reminder.entitlements
      properties:
        com.apple.security.personal-information.calendars: true

    infoPlist:
      path: Meeting Reminder/Info.plist
      properties:
        LSUIElement: true
        NSCalendarsUsageDescription: "QuickJoin benötigt Zugriff auf deine Kalender, um dich an anstehende Meetings zu erinnern."
        NSNotificationCenterUsageDescription: "QuickJoin sendet dir Benachrichtigungen für bevorstehende Events."

    frameworks:
      - EventKit
      - AppKit
      - SwiftUI
      - UserNotifications
      - ServiceManagement

  QuickJoinTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Meeting ReminderTests
        includes:
          - "**/*.swift"
    dependencies:
      - target: QuickJoin
    settings:
      GENERATE_INFOPLIST_FILE: true
