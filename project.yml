name: NevLate
projectPath: NevLate.xcodeproj

settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 5

options:
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"

  knownRegions:
    - en
    - de

schemes:
  NevLate:
    build:
      targets:
        NevLate: all
    test:
      targets:
        - NevLateTests
      gatherCoverageData: true
    run:
      askForUserToEnableDebugger: true
      consoleLogsInDebugConsole: true

targets:
  NevLate:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    bundleId: de.hendrikgrueger.nevrlate
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: de.hendrikgrueger.nevrlate
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_CFBundleIconFile: AppIcon

    sources:
      - path: Meeting Reminder
        includes:
          - "**/*.swift"
          - "Assets.xcassets"
          - "AppIcon.icns"
          - "Localizable.xcstrings"
          - "PrivacyInfo.xcprivacy"
          - "en.lproj/InfoPlist.strings"
          - "de.lproj/InfoPlist.strings"

    entitlements:
      path: Meeting Reminder/Meeting_Reminder.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.personal-information.calendars: true

    infoPlist:
      path: Meeting Reminder/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Nevr Late"
        CFBundleIconFile: "AppIcon"
        NSCalendarsUsageDescription: "Nevr Late reads your calendar events (read-only) to remind you about upcoming meetings and detect video conference join links. No data leaves your device."
        NSHumanReadableCopyright: "© 2026 Grüpi GmbH"
        NSCalendarsFullAccessUsageDescription: "Nevr Late reads your calendar events (read-only) to remind you about upcoming meetings and detect video conference join links. No data leaves your device."

    frameworks:
      - EventKit
      - AppKit
      - SwiftUI
      - UserNotifications
      - ServiceManagement
      - ApplicationServices

  NevLateTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Meeting ReminderTests
        includes:
          - "**/*.swift"
    dependencies:
      - target: NevLate
    settings:
      GENERATE_INFOPLIST_FILE: true
