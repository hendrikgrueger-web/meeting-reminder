name: NevLate
projectPath: NevLate.xcodeproj

settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1

options:
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"

  knownRegions:
    - en
    - de

schemes:
  NevLate:
    build:
      targets:
        NevLate: all
    test:
      targets:
        - NevLateTests
      gatherCoverageData: true
    run:
      askForUserToEnableDebugger: true
      consoleLogsInDebugConsole: true

targets:
  NevLate:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    bundleId: de.hendrikgrueger.nevrlate
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: de.hendrikgrueger.nevrlate

    sources:
      - path: Meeting Reminder
        includes:
          - "**/*.swift"

    resources:
      - path: Meeting Reminder
        includes:
          - "**/*.xcassets"
          - "**/*.xcstrings"
          - "**/*.xcprivacy"

    entitlements:
      path: Meeting Reminder/Meeting_Reminder.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.personal-information.calendars: true

    infoPlist:
      path: Meeting Reminder/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Nevr Late"
        NSCalendarsUsageDescription: "Nevr Late liest deine Kalender-Events (nur lesend), um dich rechtzeitig an Meetings zu erinnern und Beitreten-Links zu erkennen. Keine Daten verlassen dein Gerät."
        NSNotificationCenterUsageDescription: "Nevr Late sendet dir Benachrichtigungen für bevorstehende Events."
        NSHumanReadableCopyright: "© 2026 Hendrik Grueger"

    frameworks:
      - EventKit
      - AppKit
      - SwiftUI
      - UserNotifications
      - ServiceManagement

  NevLateTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Meeting ReminderTests
        includes:
          - "**/*.swift"
    dependencies:
      - target: NevLate
    settings:
      GENERATE_INFOPLIST_FILE: true
