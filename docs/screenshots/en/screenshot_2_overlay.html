<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1440px; height: 900px; overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(ellipse 1000px 800px at 50% 40%, #0e2044 0%, transparent 70%),
      #060d1a;
    position: relative;
  }

  /* Simulated blurred desktop content behind */
  .desktop-layer {
    position: absolute; inset: 28px 0 0 0;
    background:
      radial-gradient(ellipse 400px 300px at 20% 30%, rgba(59,130,246,0.06) 0%, transparent 100%),
      radial-gradient(ellipse 300px 200px at 80% 70%, rgba(167,139,250,0.05) 0%, transparent 100%);
  }

  /* Fake Mac app windows in background */
  .fake-win {
    position: absolute;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .win-titlebar {
    height: 28px;
    display: flex; align-items: center; gap: 7px;
    padding: 0 12px;
  }

  .win-dot { width: 12px; height: 12px; border-radius: 50%; }

  .win-body {
    display: flex; flex-direction: column; gap: 8px;
    padding: 14px 16px;
  }

  .win-line {
    height: 11px; border-radius: 6px;
    background: rgba(255,255,255,0.08);
  }

  .win-line.short { width: 55%; }
  .win-line.med { width: 75%; }
  .win-line.full { width: 100%; }
  .win-line.accent { background: rgba(59,130,246,0.18); width: 40%; }

  /* Menu bar */
  .menubar {
    position: absolute;
    top: 0; left: 0; right: 0; height: 28px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 18px;
    gap: 16px;
    z-index: 10;
  }

  .mb { font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 500; }

  .mb-bell {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px;
    padding: 2px 9px;
    font-size: 13px; color: white; font-weight: 700;
  }

  /* Dim overlay */
  .dim {
    position: absolute; inset: 28px 0 0 0;
    background: rgba(0,0,0,0.52);
    backdrop-filter: blur(4px);
    z-index: 1;
  }

  /* Center card */
  .stage {
    position: absolute; inset: 28px 0 0 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }

  /* Soft spotlight behind card */
  .spotlight {
    position: absolute;
    width: 700px; height: 600px;
    background: radial-gradient(ellipse, rgba(37,99,235,0.28) 0%, transparent 65%);
    pointer-events: none;
  }

  .card {
    width: 480px;
    background: rgba(255,255,255,0.96);
    border-radius: 28px;
    padding: 38px 36px 32px;
    color: #0f172a;
    position: relative;
    box-shadow:
      0 50px 120px rgba(0,0,0,0.65),
      0 0 0 1px rgba(255,255,255,0.15),
      0 0 100px rgba(37,99,235,0.2);
  }

  /* LIVE badge */
  .live-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 100px;
    padding: 5px 13px;
    font-size: 12px; font-weight: 700;
    color: #dc2626;
    letter-spacing: 0.8px;
    margin-bottom: 18px;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ef4444;
  }

  .big-time {
    font-size: 52px; font-weight: 800;
    color: #0f172a;
    letter-spacing: -3px; line-height: 1;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }

  .card-title {
    font-size: 24px; font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.5px; line-height: 1.2;
    margin-bottom: 10px;
  }

  .cal-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 6px;
  }

  .cal-dot {
    width: 9px; height: 9px;
    border-radius: 50%; background: #22d3ee;
  }

  .cal-name { font-size: 13px; color: rgba(0,0,0,0.4); font-weight: 500; }

  .timerange { font-size: 14px; color: rgba(0,0,0,0.35); margin-bottom: 28px; }

  .join-btn {
    width: 100%;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 16px;
    padding: 16px;
    font-size: 17px; font-weight: 800;
    color: white; text-align: center;
    margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(37,99,235,0.4);
    letter-spacing: -0.2px;
  }

  .actions {
    display: flex; align-items: center;
    justify-content: center; gap: 24px;
  }

  .action-btn {
    font-size: 13px; color: rgba(0,0,0,0.35); font-weight: 600;
  }

  .sep { width: 1px; height: 14px; background: rgba(0,0,0,0.1); }

  /* Bottom label */
  .bottom-label {
    position: absolute;
    bottom: 32px; left: 0; right: 0;
    text-align: center;
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.2px;
    z-index: 5;
  }

  /* Top eyebrow label */
  .top-label {
    position: absolute;
    top: 44px; left: 0; right: 0;
    text-align: center;
    z-index: 5;
  }

  .top-label-inner {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 7px 20px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="menubar">
    <div class="mb">WLAN</div>
    <div class="mb">🔋 91%</div>
    <div class="mb-bell">🔔 &thinsp;1</div>
    <div class="mb">14:02</div>
  </div>

  <div class="desktop-layer">
    <!-- Fake code editor window -->
    <div class="fake-win" style="top: 60px; left: 40px; width: 540px; height: 360px; background: rgba(22,32,62,0.88);">
      <div class="win-titlebar" style="background: rgba(255,255,255,0.06);">
        <div class="win-dot" style="background:#ff5f57"></div>
        <div class="win-dot" style="background:#ffbd2e"></div>
        <div class="win-dot" style="background:#28c840"></div>
      </div>
      <div class="win-body">
        <div class="win-line accent" style="background:rgba(96,165,250,0.22)"></div>
        <div class="win-line full"></div>
        <div class="win-line med"></div>
        <div class="win-line short"></div>
        <div class="win-line full"></div>
        <div class="win-line med" style="background:rgba(167,139,250,0.15)"></div>
        <div class="win-line full"></div>
        <div class="win-line short"></div>
        <div class="win-line med"></div>
        <div class="win-line full"></div>
        <div class="win-line short" style="background:rgba(96,165,250,0.15)"></div>
        <div class="win-line med"></div>
      </div>
    </div>
    <!-- Fake browser window -->
    <div class="fake-win" style="top: 70px; right: 40px; width: 460px; height: 300px; background: rgba(18,26,52,0.85);">
      <div class="win-titlebar" style="background: rgba(255,255,255,0.05);">
        <div class="win-dot" style="background:#ff5f57"></div>
        <div class="win-dot" style="background:#ffbd2e"></div>
        <div class="win-dot" style="background:#28c840"></div>
      </div>
      <div class="win-body">
        <div class="win-line" style="background:rgba(255,255,255,0.09);height:22px;border-radius:6px;width:100%"></div>
        <div class="win-line full" style="margin-top:8px;background:rgba(255,255,255,0.1)"></div>
        <div class="win-line med" style="background:rgba(255,255,255,0.07)"></div>
        <div class="win-line full" style="background:rgba(255,255,255,0.08)"></div>
        <div class="win-line short" style="background:rgba(255,255,255,0.06)"></div>
        <div class="win-line med" style="background:rgba(255,255,255,0.07)"></div>
        <div class="win-line full" style="background:rgba(255,255,255,0.08)"></div>
      </div>
    </div>
  </div>
  <div class="dim"></div>

  <div class="stage">
    <div class="spotlight"></div>
    <div class="card">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="big-time">14:00</div>
      <div class="card-title">Weekly<br>Team Review</div>
      <div class="cal-row">
        <div class="cal-dot"></div>
        <div class="cal-name">Sales Calendar</div>
      </div>
      <div class="timerange">14:00 – 15:00 · March 25</div>
      <div class="join-btn">🎥 &thinsp;Join Zoom</div>
      <div class="actions">
        <div class="action-btn">Snooze</div>
        <div class="sep"></div>
        <div class="action-btn">Dismiss</div>
      </div>
    </div>
  </div>

  <div class="top-label">
    <div class="top-label-inner">🔔 &thinsp;Nevr Late pops up right when it matters</div>
  </div>
  <div class="bottom-label">Full-screen overlay — impossible to miss, one click to join.</div>
</body>
</html>
